<!DOCTYPE html>
<html>
<head>
    <style>
        html, body { 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden; background: #eee; /* Light grey background to see the pets */
        }

        .pet-style {
            position: absolute;
            width: 50px; height: 50px; /* Bigger boxes for testing */
            image-rendering: pixelated;
            border: 2px solid black;
        }

        #pet1 { background: red; }
        #pet2 { background: blue; }

        .walking { opacity: 0.7; } /* Slight visual change when "walking" */
    </style>
</head>
<body>
    <div id="pet1" class="pet-style"></div>
    <div id="pet2" class="pet-style"></div>

    <script>
        const walkSpeed = 5;
        const petRadius = 30;
        
        let pets = [
            {
                el: document.getElementById('pet1'),
                pos: { x: 50, y: 50 },
                target: { x: 50, y: 50 }
            },
            {
                el: document.getElementById('pet2'),
                pos: { x: 150, y: 50 },
                target: { x: 150, y: 50 }
            }
        ];
        
        window.onclick = (e) => {
            pets[0].target.x = e.clientX - 25;
            pets[0].target.y = e.clientY - 25;
            pets[1].target.x = e.clientX + 30;
            pets[1].target.y = e.clientY - 25;
        };
        
        function update() {
            pets.forEach(p => {
                const dx = p.target.x - p.pos.x;
                const dy = p.target.y - p.pos.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
        
                if (dist > walkSpeed) {
                    p.pos.x += (dx / dist) * walkSpeed;
                    p.pos.y += (dy / dist) * walkSpeed;
                    p.el.classList.add('walking');
                } else {
                    p.el.classList.remove('walking');
                }
            });
        
            // Collision
            const p1 = pets[0];
            const p2 = pets[1];
            const dx = p2.pos.x - p1.pos.x;
            const dy = p2.pos.y - p1.pos.y;
            const dist = Math.sqrt(dx * dx + dy * dy) || 0.1;
        
            if (dist < petRadius * 2) {
                const overlap = (petRadius * 2) - dist;
                p1.pos.x -= (dx / dist) * (overlap / 2);
                p1.pos.y -= (dy / dist) * (overlap / 2);
                p2.pos.x += (dx / dist) * (overlap / 2);
                p2.pos.y += (dy / dist) * (overlap / 2);
            }
        
            pets.forEach(p => {
                p.el.style.left = `${p.pos.x}px`;
                p.el.style.top = `${p.pos.y}px`;
            });
        
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
