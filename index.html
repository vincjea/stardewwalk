<!DOCTYPE html>
<html>
<head>
    <style>
        html, body { 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden; background: #transparent; /* Darker background to see the glow */
        }

        .pet-style {
            position: absolute;
            width: 16px; height: 32px;
            background-image: url('spritesheet.png');
            background-size: 64px 128px;
            image-rendering: pixelated;
            transform: scale(3);
            transform-origin: top left;
            cursor: pointer; /* Shows you can click them */
            transition: box-shadow 0.2s;
        }

        /* High-visibility selection glow */
        .selected {
            filter: drop-shadow(0 0 3px rgba(255, 44, 118, 0.39));
            z-index: 100;
        }

        .walking { animation: walk-cycle 0.6s steps(4) infinite; }
        @keyframes walk-cycle { from { background-position-x: 0px; } to { background-position-x: -64px; } }

        .face-down  { background-position-y: 0px; }
        .face-right { background-position-y: -32px; }
        .face-up    { background-position-y: -64px; }
        .face-left  { background-position-y: -96px; }
    </style>
</head>
<body>
    <div id="pet1" class="pet-style face-down selected"></div>
    <div id="pet2" class="pet-style face-down"></div>

    <script>
        const walkSpeed = 4;
        const petRadius = 24;
        let selectedIndex = 0; // Starts with Pet 1

        const pets = [
            {
                el: document.getElementById('pet1'),
                pos: { x: 100, y: 100 },
                target: { x: 100, y: 100 }
            },
            {
                el: document.getElementById('pet2'),
                pos: { x: 300, y: 100 },
                target: { x: 300, y: 100 }
            }
        ];

        // 1. SPACEBAR TOGGLE
        window.addEventListener('keydown', (e) => {
            if (e.code === "Space") {
                e.preventDefault();
                toggleSelection();
            }
        });

        // 2. CLICK TO SELECT (If space fails)
        pets.forEach((p, index) => {
            p.el.addEventListener('click', (e) => {
                e.stopPropagation(); // Don't move when just selecting
                selectedIndex = index;
                updateVisualSelection();
            });
        });

        function toggleSelection() {
            selectedIndex = (selectedIndex === 0) ? 1 : 0;
            updateVisualSelection();
        }

        function updateVisualSelection() {
            pets.forEach((p, i) => {
                if (i === selectedIndex) {
                    p.el.classList.add('selected');
                } else {
                    p.el.classList.remove('selected');
                }
            });
        }

        // 3. MOVE ONLY SELECTED
        window.addEventListener('click', (e) => {
            const activePet = pets[selectedIndex];
            activePet.target.x = e.clientX - 24;
            activePet.target.y = e.clientY - 48;
        });

        function update() {
            pets.forEach(p => {
                const dx = p.target.x - p.pos.x;
                const dy = p.target.y - p.pos.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance > walkSpeed) {
                    p.el.classList.add('walking');
                    
                    // Direction
                    p.el.classList.remove('face-up', 'face-down', 'face-left', 'face-right');
                    if (Math.abs(dx) > Math.abs(dy)) {
                        p.el.classList.add(dx > 0 ? 'face-right' : 'face-left');
                    } else {
                        p.el.classList.add(dy > 0 ? 'face-down' : 'face-up');
                    }

                    p.pos.x += (dx / distance) * walkSpeed;
                    p.pos.y += (dy / distance) * walkSpeed;
                } else {
                    p.el.classList.remove('walking');
                }

                p.el.style.left = p.pos.x + "px";
                p.el.style.top = p.pos.y + "px";
            });

            // Separation logic
            const p1 = pets[0];
            const p2 = pets[1];
            const distDx = p2.pos.x - p1.pos.x;
            const distDy = p2.pos.y - p1.pos.y;
            const dist = Math.sqrt(distDx * distDx + distDy * distDy) || 0.1;
            if (dist < petRadius * 2) {
                const overlap = (petRadius * 2) - dist;
                p1.pos.x -= (distDx / dist) * (overlap / 2);
                p1.pos.y -= (distDy / dist) * (overlap / 2);
                p2.pos.x += (distDx / dist) * (overlap / 2);
                p2.pos.y += (distDy / dist) * (overlap / 2);
            }

            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
