<!DOCTYPE html>
<html>
<head>
    <style>
        /* Essential for Notion Embeds */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            background-color: rgba(0, 0, 0, 0); /* Completely transparent */
        }

        #pet {
            position: absolute;
            width: 16px; 
            height: 32px;
            background-image: url('spritesheet.png');
            background-size: 64px 128px;
            background-repeat: no-repeat;
            image-rendering: pixelated;
            /* Scale it up so you can actually see the art */
            transform: scale(3);
            transform-origin: top left;
            transition: background-position-y 0.1s;
        }

        /* Walking Animation logic */
        .walking {
            animation: walk-cycle 0.6s steps(4) infinite;
        }

        @keyframes walk-cycle {
            from { background-position-x: 0px; }
            to { background-position-x: -64px; }
        }

        /* Directional Rows */
        .face-down  { background-position-y: 0px; }
        .face-right { background-position-y: -32px; }
        .face-up    { background-position-y: -64px; }
        .face-left  { background-position-y: -96px; }
    </style>
</head>
<body>
    <div id="pet" class="face-down"></div>

    <script>
        const pet = document.getElementById('pet');
        let petPos = { x: 50, y: 50 }; // Starting position
        let mousePos = { x: 50, y: 50 };

        window.onmousemove = (e) => {
            mousePos.x = e.clientX;
            mousePos.y = e.clientY;
        };

        function update() {
            const dx = mousePos.x - (petPos.x + 24); // Offset for scale
            const dy = mousePos.y - (petPos.y + 48);
            const distance = Math.sqrt(dx * dx + dy * dy);

            // 1. MOVEMENT & IDLE LOGIC
            if (distance > 5) {
                // WALKING STATE
                pet.classList.add('walking');
                
                // Determine direction for row switching
                pet.classList.remove('face-up', 'face-down', 'face-left', 'face-right');
                if (Math.abs(dx) > Math.abs(dy)) {
                    pet.classList.add(dx > 0 ? 'face-right' : 'face-left');
                } else {
                    pet.classList.add(dy > 0 ? 'face-down' : 'face-up');
                }

                // Follow cursor
                petPos.x += dx * 0.025; 
                petPos.y += dy * 0.025;
            } else {
                // IDLE STATE
                // Removing the 'walking' class stops the animation
                // and snaps the background-position-x back to 0 (the standing frame)
                pet.classList.remove('walking');
            }

            pet.style.left = `${petPos.x}px`;
            pet.style.top = `${petPos.y}px`;
            
            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
