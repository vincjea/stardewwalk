<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; overflow: hidden; background: transparent; cursor: default; }
        #pet {
            width: 32px;  /* Width of a SINGLE frame */
            height: 32px; /* Height of a SINGLE frame */
            background-image: url('YOUR_SPRITE_SHEET.png');
            background-repeat: no-repeat;
            background-size: auto 100%; /* Keeps height consistent */
        }
        
        /* This creates the movement */
        .walking {
            animation: walk-cycle 0.6s steps(4) infinite;
        }
        
        @keyframes walk-cycle {
            from { background-position: 0px; }
            to { background-position: -128px; } /* Total width of the sheet */
        }
    </style>
</head>
<body>
    <div id="pet"></div>
    <script>
        const pet = document.getElementById('pet');
        let petPos = { x: 0, y: 0 };
        let mousePos = { x: 0, y: 0 };

        window.onmousemove = (e) => { mousePos = { x: e.clientX, y: e.clientY }; };

        function update() {
            // Easing/Follow Logic
            petPos.x += (mousePos.x - petPos.x) * 0.05;
            petPos.y += (mousePos.y - petPos.y) * 0.05;

            // Flip sprite based on direction
            const scaleX = mousePos.x > petPos.x ? 1 : -1;
            pet.style.transform = `translate(${petPos.x}px, ${petPos.y}px) scaleX(${scaleX})`;
            
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
