<!DOCTYPE html>
<html>
<head>
    <style>
        html, body { 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden; background: transparent; 
        }

        .pet-style {
            position: absolute;
            width: 16px; height: 32px;
            background-image: url('spritesheet.png');
            background-size: 64px 128px;
            image-rendering: pixelated;
            transform: scale(3);
            transform-origin: top left;
        }

        /* Walking Animation */
        .walking {
            animation: walk-cycle 0.6s steps(4) infinite;
        }

        /* Special Idle Animation (Example: breathing or blinking) */
        .special-idle {
            animation: special-cycle 1s steps(2) infinite;
        }

        @keyframes walk-cycle {
            from { background-position-x: 0px; }
            to { background-position-x: -64px; }
        }

        @keyframes special-cycle {
            from { background-position-x: 0px; }
            to { background-position-x: -32px; } /* Toggles between first 2 frames */
        }

        /* Directional Rows */
        .face-down  { background-position-y: 0px; }
        .face-right { background-position-y: -32px; }
        .face-up    { background-position-y: -64px; }
        .face-left  { background-position-y: -96px; }
    </style>
</head>
<body>
    <div id="pet" class="face-down"></div>
    <div id="pet2" class="face-down"></div>

    <script>
            const walkSpeed = 4;
            const petRadius = 30; // The "bubble" around each pet
            
            // Initialize pets with different starting positions
            let pets = [
                {
                    el: document.getElementById('pet1'),
                    pos: { x: 100, y: 100 },
                    target: { x: 100, y: 100 },
                    lastMove: Date.now()
                },
                {
                    el: document.getElementById('pet2'),
                    pos: { x: 200, y: 100 }, // Start 100px to the right
                    target: { x: 200, y: 100 },
                    lastMove: Date.now()
                }
            ];
            
            window.onclick = (e) => {
                // Pet 1 goes to the click
                pets[0].target.x = e.clientX - 24;
                pets[0].target.y = e.clientY - 48;
                pets[0].lastMove = Date.now();
            
                // Pet 2 goes slightly to the right of the click so they don't overlap
                pets[1].target.x = e.clientX + 24; 
                pets[1].target.y = e.clientY - 48;
                pets[1].lastMove = Date.now();
            };
            
            function update() {
                pets.forEach(p => {
                    const dx = p.target.x - p.pos.x;
                    const dy = p.target.y - p.pos.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
            
                    if (distance > walkSpeed) {
                        p.el.classList.remove('special-idle');
                        p.el.classList.add('walking');
                        
                        // Directional logic
                        p.el.classList.remove('face-up', 'face-down', 'face-left', 'face-right');
                        if (Math.abs(dx) > Math.abs(dy)) {
                            p.el.classList.add(dx > 0 ? 'face-right' : 'face-left');
                        } else {
                            p.el.classList.add(dy > 0 ? 'face-down' : 'face-up');
                        }
            
                        p.pos.x += (dx / distance) * walkSpeed;
                        p.pos.y += (dy / distance) * walkSpeed;
                    } else {
                        p.el.classList.remove('walking');
                        if (Date.now() - p.lastMove > 3000) {
                            p.el.classList.add('special-idle');
                        }
                    }
                });
            
                // --- SEPARATION LOGIC ---
                const p1 = pets[0];
                const p2 = pets[1];
                const dx = p2.pos.x - p1.pos.x;
                const dy = p2.pos.y - p1.pos.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
            
                if (dist < petRadius * 2) {
                    const overlap = (petRadius * 2) - dist;
                    const moveX = (dx / dist) * (overlap / 2);
                    const moveY = (dy / dist) * (overlap / 2);
            
                    // Push them away from each other
                    p1.pos.x -= moveX;
                    p1.pos.y -= moveY;
                    p2.pos.x += moveX;
                    p2.pos.y += moveY;
                }
            
                // Apply positions to the screen
                pets.forEach(p => {
                    p.el.style.left = `${p.pos.x}px`;
                    p.el.style.top = `${p.pos.y}px`;
                });
            
                requestAnimationFrame(update);
            }
            
            update();
        </script>
</body>
</html>
