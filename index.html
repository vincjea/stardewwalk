<!DOCTYPE html>
<html>
<head>
    <style>
        html, body { 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden; background: transparent; 
        }

        #pet {
            position: absolute;
            width: 16px; height: 32px;
            background-image: url('spritesheet.png');
            background-size: 64px 128px;
            image-rendering: pixelated;
            transform: scale(3);
            transform-origin: top left;
        }

        /* Walking Animation */
        .walking {
            animation: walk-cycle 0.6s steps(4) infinite;
        }

        /* Special Idle Animation (Example: breathing or blinking) */
        .special-idle {
            animation: special-cycle 1s steps(2) infinite;
        }

        @keyframes walk-cycle {
            from { background-position-x: 0px; }
            to { background-position-x: -64px; }
        }

        @keyframes special-cycle {
            from { background-position-x: 0px; }
            to { background-position-x: -32px; } /* Toggles between first 2 frames */
        }

        /* Directional Rows */
        .face-down  { background-position-y: 0px; }
        .face-right { background-position-y: -32px; }
        .face-up    { background-position-y: -64px; }
        .face-left  { background-position-y: -96px; }
    </style>
</head>
<body>
    <div id="pet" class="face-down"></div>

    <script>
        const pet = document.getElementById('pet');
        let petPos = { x: 100, y: 100 };
        let targetPos = { x: 100, y: 100 };
        let lastMoveTime = Date.now();
        let isIdle = true;

        // Change target only on click
        window.onclick = (e) => {
            targetPos.x = e.clientX - 24; // Center the sprite (16px * 3 / 2)
            targetPos.y = e.clientY - 48; // Offset for height
            lastMoveTime = Date.now();
            isIdle = false;
        };

        function update() {
            const dx = targetPos.x - petPos.x;
            const dy = targetPos.y - petPos.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance > 2) {
                // WALKING STATE
                isIdle = false;
                lastMoveTime = Date.now();
                pet.classList.remove('special-idle');
                pet.classList.add('walking');
                
                // Directional logic
                pet.classList.remove('face-up', 'face-down', 'face-left', 'face-right');
                if (Math.abs(dx) > Math.abs(dy)) {
                    pet.classList.add(dx > 0 ? 'face-right' : 'face-left');
                } else {
                    pet.classList.add(dy > 0 ? 'face-down' : 'face-up');
                }

                // Move toward target
                petPos.x += dx * 0.02; 
                petPos.y += dy * 0.02;
            } else {
                // STOPPED STATE
                pet.classList.remove('walking');
                
                // Check if we should trigger "Special Idle" after 3 seconds
                if (Date.now() - lastMoveTime > 3000) {
                    pet.classList.add('special-idle');
                }
            }

            pet.style.left = `${petPos.x}px`;
            pet.style.top = `${petPos.y}px`;
            
            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
