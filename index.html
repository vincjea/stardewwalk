<!DOCTYPE html>
<html>
<head>
    <style>
        html, body { 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden; background: transparent; 
        }

        #pet {
            position: absolute;
            width: 16px; height: 32px;
            background-image: url('spritesheet.png');
            background-size: 64px 128px;
            image-rendering: pixelated;
            transform: scale(3);
            transform-origin: top left;
        }

        /* Walking Animation */
        .walking {
            animation: walk-cycle 0.6s steps(4) infinite;
        }

        /* Special Idle Animation (Example: breathing or blinking) */
        .special-idle {
            animation: special-cycle 1s steps(2) infinite;
        }

        @keyframes walk-cycle {
            from { background-position-x: 0px; }
            to { background-position-x: -64px; }
        }

        @keyframes special-cycle {
            from { background-position-x: 0px; }
            to { background-position-x: -32px; } /* Toggles between first 2 frames */
        }

        /* Directional Rows */
        .face-down  { background-position-y: 0px; }
        .face-right { background-position-y: -32px; }
        .face-up    { background-position-y: -64px; }
        .face-left  { background-position-y: -96px; }
    </style>
</head>
<body>
    <div id="pet" class="face-down"></div>
    

    <script>
            // Configuration
            const walkSpeed = 4;
            const petRadius = 24; // Distance to keep between pets (half of sprite width * scale)
        
            // Pet Data
            let pets = [
                {
                    el: document.getElementById('pet'),
                    pos: { x: 100, y: 100 },
                    target: { x: 100, y: 100 },
                    lastMove: Date.now()
                },
                {
                    // We create the second pet element via JS or add it to HTML
                    el: createPetElement('pet2'), 
                    pos: { x: 200, y: 200 },
                    target: { x: 200, y: 200 },
                    lastMove: Date.now()
                }
            ];
        
            function createPetElement(id) {
                const div = document.createElement('div');
                div.id = id;
                div.className = 'face-down';
                // Add a CSS class or inline style to match your #pet styles
                div.style.cssText = "position:absolute; width:16px; height:32px; background-image:url('spritesheet.png'); background-size:64px 128px; image-rendering:pixelated; transform:scale(3); transform-origin:top left;";
                document.body.appendChild(div);
                return div;
            }
        
            window.onclick = (e) => {
                // Both pets move to the click, but will push each other away
                pets.forEach(p => {
                    p.target.x = e.clientX - 24;
                    p.target.y = e.clientY - 48;
                    p.lastMove = Date.now();
                });
            };
        
            function update() {
                // 1. Move each pet toward their target
                pets.forEach(p => {
                    const dx = p.target.x - p.pos.x;
                    const dy = p.target.y - p.pos.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
        
                    if (dist > walkSpeed) {
                        p.el.classList.remove('special-idle');
                        p.el.classList.add('walking');
                        
                        // Directional logic
                        p.el.classList.remove('face-up', 'face-down', 'face-left', 'face-right');
                        if (Math.abs(dx) > Math.abs(dy)) {
                            p.el.classList.add(dx > 0 ? 'face-right' : 'face-left');
                        } else {
                            p.el.classList.add(dy > 0 ? 'face-down' : 'face-up');
                        }
        
                        p.pos.x += (dx / dist) * walkSpeed;
                        p.pos.y += (dy / dist) * walkSpeed;
                    } else {
                        p.el.classList.remove('walking');
                        if (Date.now() - p.lastMove > 3000) p.el.classList.add('special-idle');
                    }
                });
        
                // 2. COLLISION AVOIDANCE
                // Compare Pet 0 and Pet 1
                const p1 = pets[0];
                const p2 = pets[1];
                
                const dx = p2.pos.x - p1.pos.x;
                const dy = p2.pos.y - p1.pos.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const minDistance = petRadius * 2; // The "personal space" bubble
        
                if (distance < minDistance) {
                    // Calculate how much they overlap
                    const overlap = minDistance - distance;
                    // Get the direction vector to push them apart
                    const nx = dx / distance; 
                    const ny = dy / distance;
        
                    // Push both pets away from each other by half the overlap
                    p1.pos.x -= nx * (overlap / 2);
                    p1.pos.y -= ny * (overlap / 2);
                    p2.pos.x += nx * (overlap / 2);
                    p2.pos.y += ny * (overlap / 2);
                }
        
                // 3. Render positions
                pets.forEach(p => {
                    p.el.style.left = `${p.pos.x}px`;
                    p.el.style.top = `${p.pos.y}px`;
                });
        
                requestAnimationFrame(update);
            }
        
            update();
        </script>
</body>
</html>
